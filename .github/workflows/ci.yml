name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[server,dev]"
      - name: Lint
        run: ruff check vibecheck scripts
      - name: Tests
        run: pytest --cov=vibecheck --cov-report=term-missing
      - name: CLI smoke test
        run: |
          vibecheck --version
          vibecheck demo --count 500 --top 5
      - name: Mock generator smoke test
        run: python scripts/generate_mock_tickets.py -n 800 --db ci.db

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build web-api image
        run: docker build -t vibecheck-ai:ci .

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run typecheck
      - run: npm run build
